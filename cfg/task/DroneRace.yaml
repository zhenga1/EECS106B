# =============================================================================
# DroneRace_task_mpcc_stage2.yaml — MPCC STAGE 2: NAVIGATION & CONTOURING
# =============================================================================
#
# GOAL: Teach the drone to stay on the racing line and pass through gates.
#
# NEW REWARD TERMS VS STAGE 1:
#   − e_c² · w_cont      ← CONTOURING ERROR (the core MPCC penalty — penalises
#                           lateral drift from the piecewise-linear racing line)
#   + gate_bonus          ← flat bonus for passing through a gate
#   + centering · w_center← TOGT insight: bonus for passing near gate center
#   + speed · w_spd       ← rewards maintaining high velocity
#
# WHY THE CONTOURING PENALTY IS THE KEY MPCC TERM:
#   In MPCC theory, the contouring cost q_c · e_c² forces the solver to keep
#   the vehicle on the racing line. Without it, the drone finds the shortest
#   path between gates (straight lines that cut corners) rather than the
#   optimal racing trajectory (which may deviate from straight but enables
#   higher exit speeds). In RL, this term shapes the policy onto the
#   piecewise-linear centerline — the simplest representation of the track.
#
# DISTRIBUTED INIT: ON — all gates trained simultaneously.
#   Without this, the drone learns gate 0 but rarely sees gates 1-3.
#
# SUCCESS CRITERION:
#   - train/stats.gates_passed > 3 consistently
#   - train/stats.mpcc_contouring_err falling (staying closer to centerline)
#   - train/stats.success > 0 (some lap completions)
# Typical training time: 80-120M frames from Stage 1 checkpoint.
#
# THEN: Switch to DroneRace_task_mpcc_stage3.yaml.
#
# =============================================================================

name: DroneRaceEnv

defaults:
  - /base/env_base@_here_
  - /base/sim_base@_here_

ppo_cfg: DroneRace.yaml

training_stage: 2
distributed_init: true    # ON for Stage 2 — critical for multi-gate training

env:
  num_envs: 500
  max_episode_length: 600   # slightly longer — allows full-lap attempts

sim:
  substeps: 5
  dt: 0.002

drone_model:
  name: Iris
  controller: RateController

total_frames: 120_000_000
save_interval: 100

# ------ CIRCULAR TRACK -------------------------------------------------------
track_config:
  "1":
    pos: [0.0, 0.0, 1.0]
    yaw: 1.57
  "2":
    pos: [5.0, 5.0, 1.0]
    yaw: 0
  "3":
    pos: [10.0, 0.0, 1.0]
    yaw: -1.57
  "4":
    pos: [5.0, -5.0, 1.0]
    yaw: 3.14
  "5":
    pos: [0.0, 0.0, 1.0]
    yaw: 1.57

gate_scale: 1.0
gate_height: 2.5
gate_width: 2.5

bounds_x_min: -5.0
bounds_x_max: 15.0
bounds_y_min: -10.0
bounds_y_max: 10.0
bounds_z_max: 8.0

# ------ MPCC REWARD SCALES (STAGE 2) -----------------------------------------
#
# REWARD BALANCE GUIDE (approximate per successful episode):
#   r_prog:   ~20 total  (7m/gate × 2.0 × 4 gates ÷ 500 steps rough estimate)
#   r_cont:  ~-5 total  (small when following centerline: e_c~0.5m, 0.5²×0.3×500)
#   r_gate:  ~40 total  (gate_bonus × 4 gates)
#   r_center: ~8 total  (w_center × centering × 4 gates, if centered)
#   r_spd:   ~20 total  (5 m/s × 0.05 × 500 steps, rough)
#   r_up:     ~3 total  (0.1 × ~0.9 uprightness × 500 steps)
#   r_time:   -3 total  (0.005 × 600 steps)
#   r_crash: -10/episode at start, falling to near 0 as drone improves
# A clean 4-gate episode should yield ~85-90 total reward.

# Stage 1: Stability / Progress (reduced from Stage 1 — drone is more stable now)
mpcc_w_prog:  2.0       # Keep strong — arc-length progress remains primary signal
mpcc_w_up:    0.1       # Greatly reduced — drone is stable from Stage 1 training
                        # Set to 0.0 if the drone is still too conservative
mpcc_w_time:  0.005     # Slightly increased — begin pushing for speed
mpcc_w_crash: 20.0      # Increased — crashing loses more than gate passage gains

# Stage 2: Navigation / Contouring (ALL NEW in Stage 2)
mpcc_w_cont:   0.3      # Contouring penalty weight. THE CORE MPCC TERM.
                        # INCREASE to 0.5 if drone cuts corners and misses gates.
                        # DECREASE to 0.1 if drone is so cautious it barely moves.
mpcc_gate_bonus: 10.0   # Flat gate passage reward.
                        # INCREASE if drone circles gate instead of flying through.
mpcc_w_center: 3.0      # Gate center quality bonus (from TOGT insight).
                        # Range: 0.0 at edge → 3.0 at center.
                        # INCREASE if drone clips gate edges consistently.
mpcc_w_spd:    0.05     # Speed reward weight.
                        # INCREASE if drone slows down near gates.
                        # DECREASE if drone flies so fast it misses gates.

# Stage 3: Full MPCC (DISABLED in Stage 2 — listed for reference)
mpcc_w_lag:   0.0
mpcc_w_sm:    0.0
mpcc_w_lap:   0.0

debug_gate_origins: false
debug_axis_length: 0.5