# Gate settings
gate_scale: 1.0
gate_height: 2.5 
gate_width: 2.5 

# ── MPCC-style reward hyperparameters ──────────────────────────────────────
# Converts MPCC's cost J = q_c·e_c² + q_l·e_l² − μ_v·Δθ into an RL reward.
# Racing line = straight segment from prev gate centre → current gate centre.
# Drone position is decomposed into lag (along segment) and contouring (⊥).
#
# Sources: MPCC (TRO 2022), MPCC++ (2024), Swift (Nature 2023), MonoRace
# (2026), MPPI ref-free (2024), Actor-Critic MPC (TRO 2025), TOGT (2023).

# ── Bootstrap / basic-flight rewards ───────────────────────────────────────
# Finetuning from Hover: the pre-trained backbone already knows how to fly,
# so bootstrap weights can be modest — they mainly prevent regressing to
# ground-crashing if the first-layer adaptation briefly destabilises flight.
w_upright:    0.3    # keep drone z-axis up; slightly stronger to reinforce Hover prior
w_altitude:   0.4    # exp(-|z - gate_z|) — guide to gate height

# ── Approach / progress rewards ────────────────────────────────────────────
# Stronger approach+progress than scratch training: the policy already hovers
# stably so gate-approach is the primary thing to learn.
w_approach:   2.0    # stronger backup Euclidean approach signal
w_progress:  10.0    # MPCC Δlag reward — main driver toward each gate
progress_k:   3

# ── Contouring / lag penalties ─────────────────────────────────────────────
# Raise from 0.2 → 0.35: hover prior means the drone won't fall immediately,
# so we can afford a tighter contouring penalty to learn clean racing lines.
w_contouring: 0.35   # q_c — lateral deviation² penalty

# ── Gate / completion bonuses ──────────────────────────────────────────────
# Large gate bonus is the key credit-assignment signal for sequential gates.
w_gate:       15.0   # one-time bonus per gate passed (larger than scratch to prioritise gates)
w_centering:  4.0    # bonus proportional to crossing accuracy (TOGT)
w_completion: 80.0   # big lap-completion bonus — strong terminal signal for 13 gates

# ── Speed / time rewards ───────────────────────────────────────────────────
w_speed:      0.2    # encourage fast flight (learned hover is too slow for racing)
w_time:       0.25   # per-step cost — hover strategy must be strictly worse than forward progress

# ── Crash / smoothness ─────────────────────────────────────────────────────
w_crash:      20.0   # high crash penalty — finetuned policy should not regress on safety
w_bypass:     20.0   # strong bypass penalty — bypassing any of the 13 gates is very bad
w_smooth:     0.001  # action smoothness (small, keep from fighting the hover prior)
w_ang_rate:   0.008  # angular rate² — slight increase to discourage aggressive roll/pitch

# ── Progress-based stall termination ──────────────────────────────────────
# Tighter stall_patience than scratch (800 → 500): the hover policy should
# start making progress within a few seconds, not 8 s.  Shorter stalls →
# more gate-crossing attempts per hour of compute.
w_stall:        20.0  # higher penalty magnitude — failure to progress is costly
stall_patience: 500   # 5 s sim time before stall fires (inter-gate ≤ ~10m at 2 m/s = 5 s)
w_stall_step:   0.03  # per-step stall penalty — grows pressure over the patience window
# ──────────────────────────────────────────────────────────────────────────

# ── Trajectory ────────────────────────────────────────────────────────────
# "catmull_rom": interpolating cubic Hermite via scipy — passes through every
#               gate centre exactly.  Recommended.
# "linear":     piecewise-linear — correct but sharp corners.
# "spline":     legacy B-spline — BUGGY: skips gate 2 and gate N-1.
trajectory_method: catmull_rom
trajectory_num_points: 300   # more points → finer closest-point lookup

# ── Debug visualisation (set to true when running with headless=false) ─────
# Draws gate-frame axes (R=x, G=y, B=z) + coloured trajectory in Isaac Sim.
debug_gate_origins: false
debug_axis_length: 0.5