# hydra.job.chdir: false

headless: false

sim: ${task.sim}
env: ${task.env}

total_frames: ${oc.select:task.total_frames,1000}
max_iters: -1
eval_interval: -1
save_interval: -1
seed: 0
# deterministic: true

viewer:
  resolution: [960, 720]
  eye: [8, 0., 6.]
  lookat: [0., 0., 1.]

wandb:
  group: ${oc.select:..task.name}
  run_name: ${oc.select:..task.name,test}-${oc.select:..algo.name,none}
  job_type: train
  entity: yingk-university-of-california-berkeley
  project: omnidrones
  mode: online # set to 'disabled' when debugging locally
  run_id:
  monitor_gym: True
  tags:

defaults:
  - task: Hover
  - algo: mappo
  - _self_
