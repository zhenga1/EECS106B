# Gate settings
gate_scale: 1.0
gate_height: 2.5 
gate_width: 2.5 

# ── MPCC-style reward hyperparameters ──────────────────────────────────────
# Converts MPCC's cost J = q_c·e_c² + q_l·e_l² − μ_v·Δθ into an RL reward.
# Racing line = straight segment from prev gate centre → current gate centre.
# Drone position is decomposed into lag (along segment) and contouring (⊥).
#
# Sources: MPCC (TRO 2022), MPCC++ (2024), Swift (Nature 2023), MonoRace
# (2026), MPPI ref-free (2024), Actor-Critic MPC (TRO 2025), TOGT (2023).

w_approach:   2.0    # [KY, Claude] reward per metre of approach to gate — bootstrap signal so PPO has non-zero gradient from the start
w_progress:   2.0    # μ_v — reward per metre of forward progress (Δlag) along racing line
w_contouring: 0.4    # q_c — penalty weight on contouring error² (lateral deviation from line)
w_lag:        0.05   # q_l — penalty weight on normalised lag error² (pacing, generally small)
w_gate:       10.0   # one-time bonus for passing through a gate (Swift)
w_centering:  3.0    # bonus scaled by gate-crossing accuracy (TOGT: gate as spatial volume)
w_speed:      0.04   # reward for speed magnitude (MonoRace / MPPI)
w_time:       0.01   # per-step cost to encourage speed (Swift)
w_crash:      10.0   # penalty applied on crash termination
w_smooth:     0.001  # penalty on action rate-of-change (Swift r_cmd)
w_completion: 50.0   # large bonus for completing the full lap
# ──────────────────────────────────────────────────────────────────────────

debug_gate_origins: false
debug_axis_length: 0.5