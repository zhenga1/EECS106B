name: DroneRaceEnv

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

# Task-specific PPO overrides. Points to a file in cfg/algo/ that is merged
# over the default ppo.yaml when this task is loaded.
ppo_cfg: DroneRace.yaml

env:
  num_envs: 500            # <-- EDIT: number of parallel environments
  max_episode_length: 5000 # <-- EDIT: max steps per episode before truncation

sim:
  substeps: 5   # overrides the default of 5
  dt: 0.002 
  
drone_model:
  name: Iris
  controller: RateController

total_frames: 200_000_000
save_interval: 100 
# seed: 0

# Track configuration: config-based track with custom gate positions and orientations
# Gate's local x axis is perpendicular to surface. Center is on the bottom middle. 
# IMPORTANT: The last gate should be the exact same pos and yaw as the first gate. 

# Circular track 
# track_config:
#   "1":
#     pos: [0.0, 0.0, 1.0]
#     yaw: 1.57
#   "2":
#     pos: [5.0, 5.0, 1.0]
#     yaw: 0
#   "3":
#     pos: [10.0, 0.0, 1.0]
#     yaw: -1.57
#   "4":
#     pos: [5.0, -5.0, 1.0]
#     yaw: 3.14  # pi
#   "5":
#     pos: [0.0, 0.0, 1.0]
#     yaw: 1.57

# Figure 8 
# track_config:
#   "1":
#     pos: [0.0, 0.0, 1.0]
#     yaw: 1.57
#   "2":
#     pos: [2.0, 3.0, 1.0]
#     yaw: 0
#   "3":
#     pos: [10.0, -3.0, 1.0]
#     yaw: 0
#   "4":
#     pos: [12.0, 0.0, 1.0]
#     yaw: 1.57
#   "5":
#     pos: [10.0, 3.0, 1.0]
#     yaw: 3.14
#   "6":
#     pos: [2.0, -3.0, 1.0]
#     yaw: 3.14
#   "7":
#     pos: [0.0, 0.0, 1.0]
#     yaw: 1.57

# Race track
track_config:
  "1":
    pos: [12.5, 2.0, 1.0]
    yaw: 3.14

  "2":
    pos: [6.5, 6.0, 1.0]
    yaw: 2.36

  "3":
    pos: [5.5, 14.0, 1.0]
    yaw: 2.093

  "4":
    pos: [2.5, 24.0, 1.0]
    yaw: 1.57

  "5":
    pos: [7.5, 30.0, 1.0]
    yaw: 6.11

  "6":
    pos: [12.2, 22.0, 1.0]
    yaw: 6.28

  "7":
    pos: [17.5, 30.0, 3.0]
    yaw: 7.68

  "8":
    pos: [17.5, 30.0, 1.0]
    yaw: 4.54

  "9":
    pos: [18.0, 22.0, 1.0]
    yaw: 4.88

  "10":
    pos: [20.5, 14.0, 1.0]
    yaw: 4.54

  "11":
    pos: [18.5, 6.0, 3.0]
    yaw: 3.92

  "12":
    pos: [18.5, 6.0, 1.0]
    yaw: 3.92

  "13":
    pos: [12.5, 2.0, 1.0]
    yaw: 3.14
    
# Gate settings
gate_scale: 1.0
gate_height: 2.5 
gate_width: 2.5 

# ---- STUDENT EDIT: reward hyperparameters --------------------------------
# Swift-style competitive drone racing hyperparameters
w_progress: 5.0        # primary dense signal
w_contouring: 0.001    # squared-error: 0.01×err²/step; at 1m→-0.01, at 5m→-0.25 (was 1.0→-5000/ep at 1m!)
w_gate: 10.0
w_centering: 1.5
w_speed: 0.001          # per-step; at 5m/s → 0.05/step → 250/ep max
w_time: 0.005          # constant drain; 0.005×5000=25/ep (was 0.30→1500/ep)
w_crash: 8.0
w_smooth: 0.1
w_completion: 50.0
w_upright: 0.002       # per-step; 0.002×5000=10/ep max (was 1.0→5000/ep!)
w_altitude: 0.005      # per-step; exp decay, max 0.005×5000=25/ep
w_ang_rate: 0.003
w_bypass: 15.0
w_stall: 30.0          # must exceed accumulated proximity reward during stall window
stall_patience: 300    # ~3s without a gate → episode ends (was 800: too lenient)

w_alignment: 0.3      # cosine similarity of velocity to path tangent; in [-1,1]×0.3/step
w_proximity: 1.0      # 1/r reward within approach cone; max = w_proximity/0.5 = 2.0 at 0.5m
proximity_cone_cos: 0.5  # cos(60°) half-angle — wider cone = 0.0 (90°), narrower = 0.7 (45°)
# --------------------------------------------------------------------------

debug_gate_origins: false
debug_axis_length: 0.5