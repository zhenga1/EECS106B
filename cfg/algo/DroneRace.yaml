name: ppo

# ---- STUDENT EDIT: PPO training schedule ---------------------------------
train_every: 32   # <-- EDIT: collect this many env steps before each update
ppo_epochs: 4     # was 8 — 8×5=40 gradient steps per rollout caused policy oscillation
# --------------------------------------------------------------------------
num_minibatches: 4
clip_param: 0.15  # was 0.2 — tighter clip reduces variance in policy updates
entropy_coef: 0.05       # start high for exploration — cosine-annealed down to entropy_coef_min
entropy_coef_min: 0.0001  # final value after annealing (near-zero = exploitation)
entropy_anneal_steps: 5000   # 100M frames / (500envs × 32 steps) ≈ 6250 train calls total; 5000 ≈ 80% of run
gae_lambda: 0.95
gamma: 0.995  # longer credit-assignment horizon: 200 steps (2s) vs 100 steps (1s) at 0.99 — ablation showed this + wider network is superadditive
max_grad_norm: 5.0

# whether to use privileged information
priv_actor: false
priv_critic: false

checkpoint_path:

actor:
  # ---- STUDENT EDIT: actor network --------------------------------------
  lr: 0.0003                   # <-- EDIT: learning rate
  hidden_units: [512, 512, 512] # ablation winner: [256,256]→[512,512,512] was single biggest win
  activation: elu              # <-- EDIT: relu, leaky_relu, elu, gelu, tanh, silu
  # -----------------------------------------------------------------------
  lr_scheduler: 
  lr_scheduler_kwargs:
    T_max: 50000    # ~full 1B-frame run at 500 envs × train_every=32
    eta_min: 0.00002  # decay to 10% of initial lr
  layer_norm: true
  weight_decay: 0.0

critic:
  # ---- STUDENT EDIT: critic network -------------------------------------
  lr: 0.0003                   # <-- EDIT: learning rate
  hidden_units: [512, 512, 512] # match actor depth
  activation: elu              # <-- EDIT: relu, leaky_relu, elu, gelu, tanh, silu
  # ----------------------------------------------------------------------- 
  # CosineAnnealingLR
  lr_scheduler: 
  lr_scheduler_kwargs:
    T_max: 50000
    eta_min: 0.00002
  layer_norm: true
  weight_decay: 0.0
  use_huber_loss: false
  huber_delta: 10.0
