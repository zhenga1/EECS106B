# Gate settings
gate_scale: 1.0
gate_height: 2.5 
gate_width: 2.5 

# ── MPCC-style reward hyperparameters ──────────────────────────────────────
# Converts MPCC's cost J = q_c·e_c² + q_l·e_l² − μ_v·Δθ into an RL reward.
# Racing line = straight segment from prev gate centre → current gate centre.
# Drone position is decomposed into lag (along segment) and contouring (⊥).
#
# Sources: MPCC (TRO 2022), MPCC++ (2024), Swift (Nature 2023), MonoRace
# (2026), MPPI ref-free (2024), Actor-Critic MPC (TRO 2025), TOGT (2023).

# ── Bootstrap / basic-flight rewards ───────────────────────────────────────
# Without these, an untrained policy outputs near-zero thrust → drone falls
# → all episodes identical → return variance ≈ 0 → explained_var = -∞.
w_alive:      0.5    # per-step bonus for staying above min_alive_z (key bootstrap)
w_upright:    1.0    # bonus for drone z-axis pointing up (prevents tumbling)
w_altitude:   2.0    # exp(-|z - gate_z|) bonus for flying at gate height
min_alive_z:  1.0    # minimum altitude (m) to receive alive bonus
w_vel_up: 0.5   # reward for upward velocity when below gate height

# ── Approach / progress rewards ────────────────────────────────────────────
w_approach:   2.0    # reward per metre of approach to gate (dense bootstrap signal)
w_progress:   2.0    # μ_v — reward per metre of forward progress (Δlag) along racing line

# ── Contouring / lag penalties ─────────────────────────────────────────────
# Reduced from 0.4 → 0.1: drone must learn to fly first; strong contouring
# penalty during early training just produces large negative rewards that swamp
# the sparse gate bonuses and discourage exploration.
w_contouring: 0.1    # q_c — penalty weight on contouring error² (lateral deviation)
w_lag:        0.05   # q_l — penalty weight on normalised lag error² (pacing)

# ── Gate / completion bonuses ──────────────────────────────────────────────
w_gate:       50.0   # one-time bonus for passing through a gate (Swift)
w_centering:  3.0    # bonus scaled by gate-crossing accuracy (TOGT)
w_completion: 500.0   # large bonus for completing the full lap

# ── Speed / time rewards ───────────────────────────────────────────────────
# Increased w_speed 0.04 → 0.15 and w_time 0.01 → 0.05:
# these create a "go fast or get penalised" gradient that prevents the policy
# from learning to hover indefinitely to collect alive_bonus.
w_speed:      0.15   # reward for speed magnitude (MonoRace / MPPI)
w_time:       0.05   # per-step cost to encourage speed (Swift)

# ── Crash / smoothness ─────────────────────────────────────────────────────
# Increased w_crash 10 → 20: crash_penalty is now actually applied (it was
# defined but unused in the reward sum — now fixed in drone_race.py).
w_crash:      20.0   # base crash penalty × cone_dist (dimensionless)
crash_lag_ref: 5.0  # reference approach dist (m); with gate_width/2=1.25m → cone half-angle ≈14°
w_bypass:     15.0  # one-time penalty for crossing the gate plane outside the opening
w_smooth:     0.001  # penalty on action rate-of-change (Swift r_cmd)
# ──────────────────────────────────────────────────────────────────────────

# ── Trajectory ────────────────────────────────────────────────────────────
# "catmull_rom": interpolating cubic Hermite via scipy — passes through every
#               gate centre exactly.  Recommended.
# "linear":     piecewise-linear — correct but sharp corners.
# "spline":     legacy B-spline — BUGGY: skips gate 2 and gate N-1.
trajectory_method: catmull_rom
trajectory_num_points: 300   # more points → finer closest-point lookup

# ── Debug visualisation (set to true when running with headless=false) ─────
# Draws gate-frame axes (R=x, G=y, B=z) + coloured trajectory in Isaac Sim.
debug_gate_origins: false
debug_axis_length: 0.5