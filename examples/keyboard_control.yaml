headless: false

sim:
  dt: 0.016
  substeps: 1
  gravity: [0, 0, -9.81]
  replicate_physics: false
  use_flatcache: true
  use_gpu_pipeline: true
  device: "cuda:0"

  solver_type: 1
  use_gpu: True # set to False to run on CPU
  bounce_threshold_velocity: 0.2
  friction_offset_threshold: 0.04
  friction_correlation_distance: 0.025
  enable_stabilization: True

  # GPU buffers
  gpu_max_rigid_contact_count: 524288
  gpu_max_rigid_patch_count: 163840
  gpu_found_lost_pairs_capacity: 4194304
  gpu_found_lost_aggregate_pairs_capacity: 33554432
  gpu_total_aggregate_pairs_capacity: 4194304
  gpu_max_soft_body_contacts: 1048576
  gpu_max_particle_contacts: 1048576
  gpu_heap_capacity: 67108864
  gpu_temp_buffer_capacity: 16777216
  gpu_max_num_partitions: 8

viewer:
  resolution: [960, 720]
  eye: [3., 3., 3.]
  lookat: [0., 0., 1.]

drone_model:
  name: Hummingbird
  controller: LeePositionController

# Forest environment option
use_forest: false  # Set to true to use Forest environment with terrain and obstacles
lidar_range: 4.0  # Maximum lidar range (only used if use_forest is true)
lidar_vfov: [-10., 20.]  # Vertical field of view for lidar (only used if use_forest is true)
time_encoding: false  # Whether to include time encoding (only used if use_forest is true)
reward_effort_weight: 0.1  # Reward effort weight (only used if use_forest is true)

# Control parameters (Position Mode - similar to PX4)
max_vel_horizontal: 2.0  # Maximum horizontal velocity in m/s
max_vel_vertical: 1.5  # Maximum vertical velocity in m/s
max_yaw_rate: 1.0  # Maximum yaw rate in rad/s

# Joystick parameters
joystick_deadzone: 0.1  # Deadzone for joystick sticks (0.0 to 1.0)
joystick_id: 0  # Joystick device ID (0 for first joystick)

steps: 10000  # Maximum simulation steps (can exit earlier with ESC)
