name: ppo

# ---- STUDENT EDIT: PPO training schedule ---------------------------------
train_every: 256   # collect this many env steps before each update
ppo_epochs: 4      # gradient epochs per update
# --------------------------------------------------------------------------
num_minibatches: 8  # increased from 5 → larger minibatches, more stable gradient estimates
clip_param: 0.2
# entropy_coef: increased 0.003 → 0.01.
# Rationale: policy collapsed to "lie on ground" at entropy≈2. Higher entropy
# coef keeps the distribution broader during early training so the drone
# can explore different thrust levels and discover that flying is rewarded.
entropy_coef: 0.01
gae_lambda: 0.95
gamma: 0.99
max_grad_norm: 5.0

# whether to use privileged information
priv_actor: false
priv_critic: false

# checkpoint_path: remove this to specify it with a different method

actor:
  # ---- STUDENT EDIT: actor network --------------------------------------
  lr: 0.0002                # <-- EDIT: learning rate
  hidden_units: [256, 256, 256]  # <-- EDIT: list of hidden layer sizes, e.g. [256, 256, 256]
  activation: elu          # <-- EDIT: relu, leaky_relu, elu, gelu, tanh, silu
  # -----------------------------------------------------------------------
  lr_scheduler:
  lr_scheduler_kwargs:
  layer_norm: true
  weight_decay: 0.0

critic:
  # ---- STUDENT EDIT: critic network -------------------------------------
  lr: 0.0002                # <-- EDIT: learning rate
  hidden_units: [256, 256, 256]  # <-- EDIT: list of hidden layer sizes
  activation: elu          # <-- EDIT: relu, leaky_relu, elu, gelu, tanh, silu
  # -----------------------------------------------------------------------
  lr_scheduler:
  lr_scheduler_kwargs:
  layer_norm: true
  weight_decay: 0.0
  use_huber_loss: false
  huber_delta: 10.0
