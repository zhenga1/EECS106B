name: sac

buffer_size: 1_000_000
train_every: 64
batch_size: 4096
gamma: 0.95
tau: 0.005
max_grad_norm: 5

share_actor: true

# gradient_steps: 2048
gradient_steps: 512 
# [KY, Claude] reduced from 2048 to 512 to stabilise 
# training; with the larger batch size of 4096, 512 
# gradient steps is sufficient for good performance 
# and reduces the risk of overfitting to a small 
#number of recent episodes.

actor:
  hidden_units: [256, 128, 128]
  lr: 0.0005
  layer_norm: true

critic:
  hidden_units: [256, 128, 128]
  lr: 0.0005
  layer_norm: true

critic_loss: smooth_l1
alpha_lr: 0.0001

actor_delay: 2
target_update_interval: 4
